name: TID-SecureCI

on:
  workflow_call:
    inputs:
      target_repository:
        description: "owner/repo to scan. Defaults to the caller repository."
        required: false
        type: string
        default: ""
      target_ref:
        description: "Git ref, branch, or SHA to scan. Defaults to the caller SHA."
        required: false
        type: string
        default: ""
      image_ref:
        description: "Optional container image to scan with Trivy."
        required: false
        type: string
        default: ""
      fail_severity:
        description: "Severity threshold for blocking scans."
        required: false
        type: string
        default: "HIGH,CRITICAL"
      enforce:
        description: "Fail the workflow on findings. Start with false, then turn on after tuning."
        required: false
        type: boolean
        default: false
      enable_semgrep:
        required: false
        type: boolean
        default: true
      enable_gitleaks:
        required: false
        type: boolean
        default: true
      enable_osv:
        required: false
        type: boolean
        default: true
      enable_checkov:
        required: false
        type: boolean
        default: true
      enable_trivy:
        required: false
        type: boolean
        default: true
      enable_sbom:
        required: false
        type: boolean
        default: true
      upload_artifacts:
        required: false
        type: boolean
        default: true
      report_recipient:
        description: "Email address to send this scan's report to. Defaults to the TIDHQ owner address."
        required: false
        type: string
        default: ""
      report_name:
        description: "Title shown on the report cover page."
        required: false
        type: string
        default: "Application Security Scan Report"
    secrets:
      checkout_token:
        required: false
      semgrep_app_token:
        required: false
      smtp_server:
        description: "SMTP host. When set, the summary report is emailed. For Proton use smtp.protonmail.ch."
        required: false
      smtp_port:
        description: "SMTP port. Defaults to 587 (STARTTLS), as used by Proton SMTP submission."
        required: false
      smtp_username:
        description: "SMTP auth username. For Proton this is your full Proton address."
        required: false
      smtp_password:
        description: "SMTP password. For Proton this is the SMTP submission token."
        required: false
      mail_from:
        description: "From address. For Proton this must be the address tied to the SMTP token."
        required: false
      report_owner:
        description: "TIDHQ owner address. Used as the default recipient and BCC'd on every report."
        required: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: tid-secureci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

env:
  SCAN_DIR: target
  RESULTS_DIR: results
  GITLEAKS_VERSION: 8.24.2
  OSV_SCANNER_VERSION: 2.3.0
  TRIVY_VERSION: 0.69.3

jobs:
  prepare:
    name: Prepare Target
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.resolve.outputs.repository }}
      ref: ${{ steps.resolve.outputs.ref }}
      is_self: ${{ steps.resolve.outputs.is_self }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          repository="${{ inputs.target_repository }}"
          ref="${{ inputs.target_ref }}"

          if [ -z "${repository}" ]; then
            repository="${{ github.repository }}"
          fi

          # Whether we are scanning the caller's own repository (self-scan) or a
          # different/remote repository. Code-scanning SARIF uploads only work
          # for the caller's own commits, so this gates those uploads later.
          if [ "${repository}" = "${{ github.repository }}" ]; then
            is_self="true"
          else
            is_self="false"
          fi

          # Only default the ref to the caller's commit when self-scanning.
          # For a remote target the caller SHA is not a ref in that repo, so
          # leave it blank and let checkout use the target's default branch.
          if [ -z "${ref}" ] && [ "${is_self}" = "true" ]; then
            ref="${{ github.sha }}"
          fi

          echo "is_self=${is_self}" >> "${GITHUB_OUTPUT}"

          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        continue-on-error: ${{ !inputs.enforce }}
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          allow-licenses: MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,Python-2.0,Python-2.0.1,MPL-2.0

  code-and-secrets:
    name: Code And Secrets
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Prepare results directory
        shell: bash
        run: mkdir -p "${RESULTS_DIR}"

      - name: Install Semgrep
        if: ${{ inputs.enable_semgrep }}
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep

      - name: Create custom Semgrep rules
        if: ${{ inputs.enable_semgrep }}
        shell: bash
        run: |
          cat > "${RUNNER_TEMP}/semgrep-ml.yml" <<'YAML'
          rules:
            - id: tid-llm-trust-remote-code
              message: "Avoid `trust_remote_code=True` when loading external models."
              severity: ERROR
              languages: [python]
              pattern: trust_remote_code=True
              metadata:
                category: security
            - id: tid-python-pickle-load
              message: "`pickle.load` on untrusted data is unsafe."
              severity: ERROR
              languages: [python]
              pattern: pickle.load(...)
              metadata:
                category: security
            - id: tid-python-joblib-load
              message: "`joblib.load` can deserialize untrusted code."
              severity: WARNING
              languages: [python]
              pattern: joblib.load(...)
              metadata:
                category: security
            - id: tid-python-torch-load
              message: "Review `torch.load` inputs for untrusted model artifacts."
              severity: WARNING
              languages: [python]
              pattern: torch.load(...)
              metadata:
                category: security
            - id: tid-python-subprocess-shell
              message: "`shell=True` can allow command injection."
              severity: ERROR
              languages: [python]
              patterns:
                - pattern: subprocess.$FUNC(..., shell=True, ...)
              metadata:
                category: security
            - id: tid-js-child-process-exec
              message: "Review dynamic shell execution in child_process."
              severity: WARNING
              languages: [javascript, typescript]
              patterns:
                - pattern-either:
                    - pattern: exec(...)
                    - pattern: execSync(...)
              metadata:
                category: security
          YAML

      - name: Run Semgrep
        if: ${{ inputs.enable_semgrep }}
        shell: bash
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.semgrep_app_token }}
        run: |
          set +e
          semgrep scan \
            --config auto \
            --config "${RUNNER_TEMP}/semgrep-ml.yml" \
            --sarif \
            --output "${RESULTS_DIR}/semgrep.sarif" \
            "${SCAN_DIR}"
          status=$?
          set -e

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "Semgrep reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Install Gitleaks
        if: ${{ inputs.enable_gitleaks }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${RUNNER_TEMP}/gitleaks.tar.gz"
          tar -xzf "${RUNNER_TEMP}/gitleaks.tar.gz" -C "${RUNNER_TEMP}"
          install "${RUNNER_TEMP}/gitleaks" "${RUNNER_TEMP}/bin/gitleaks"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run Gitleaks
        if: ${{ inputs.enable_gitleaks }}
        shell: bash
        run: |
          set +e
          gitleaks git \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path "${RESULTS_DIR}/gitleaks.sarif" \
            "${SCAN_DIR}"
          status=$?
          set -e

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "Gitleaks reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Upload Semgrep SARIF
        if: ${{ always() && needs.prepare.outputs.is_self == 'true' && inputs.enable_semgrep && hashFiles('results/semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/semgrep.sarif
          category: semgrep
          checkout_path: target

      - name: Upload Gitleaks SARIF
        if: ${{ always() && needs.prepare.outputs.is_self == 'true' && inputs.enable_gitleaks && hashFiles('results/gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/gitleaks.sarif
          category: gitleaks
          checkout_path: target

      - name: Upload code scan artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-code-and-secrets
          if-no-files-found: ignore
          path: results/

  dependency-supply-chain:
    name: Dependency And Supply Chain
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Prepare results directory
        shell: bash
        run: mkdir -p "${RESULTS_DIR}"

      - name: Install OSV-Scanner
        if: ${{ inputs.enable_osv }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o "${RUNNER_TEMP}/osv-scanner"
          install "${RUNNER_TEMP}/osv-scanner" "${RUNNER_TEMP}/bin/osv-scanner"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run OSV-Scanner
        if: ${{ inputs.enable_osv }}
        shell: bash
        run: |
          set +e
          osv-scanner scan source \
            -r \
            --format sarif \
            --output "${RESULTS_DIR}/osv.sarif" \
            "${SCAN_DIR}"
          status=$?
          set -e

          if [ "${status}" -eq 128 ]; then
            echo "OSV-Scanner did not find lockfiles or manifests to analyze."
            exit 0
          fi

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "OSV-Scanner reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Upload OSV SARIF
        if: ${{ always() && needs.prepare.outputs.is_self == 'true' && inputs.enable_osv && hashFiles('results/osv.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/osv.sarif
          category: osv-scanner
          checkout_path: target

      - name: Upload dependency scan artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-dependency-scan
          if-no-files-found: ignore
          path: results/

  infrastructure-and-images:
    name: Infrastructure And Images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Prepare results directory
        shell: bash
        run: mkdir -p "${RESULTS_DIR}"

      - name: Install Checkov
        if: ${{ inputs.enable_checkov }}
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install checkov

      - name: Install Trivy
        if: ${{ inputs.enable_trivy }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o "${RUNNER_TEMP}/trivy.tar.gz"
          tar -xzf "${RUNNER_TEMP}/trivy.tar.gz" -C "${RUNNER_TEMP}/bin" trivy
          chmod +x "${RUNNER_TEMP}/bin/trivy"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run Checkov
        if: ${{ inputs.enable_checkov }}
        shell: bash
        run: |
          set +e
          checkov \
            -d "${SCAN_DIR}" \
            --framework terraform,kubernetes,dockerfile,secrets,github_actions,helm,arm,bicep,cloudformation,sca_package \
            --download-external-modules true \
            -o sarif \
            --output-file-path "${RESULTS_DIR}/checkov-out"
          status=$?
          set -e

          # Checkov treats --output-file-path as a directory and writes
          # results_sarif.sarif inside it. Flatten it to the single file path
          # the rest of the pipeline (counts, findings, SARIF upload) expects.
          if [ -f "${RESULTS_DIR}/checkov-out/results_sarif.sarif" ]; then
            mv "${RESULTS_DIR}/checkov-out/results_sarif.sarif" "${RESULTS_DIR}/checkov.sarif"
          fi
          rm -rf "${RESULTS_DIR}/checkov-out"

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "Checkov reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Run Trivy filesystem scan
        if: ${{ inputs.enable_trivy }}
        shell: bash
        run: |
          trivy fs \
            --scanners vuln,misconfig,secret,license \
            --severity "${{ inputs.fail_severity }}" \
            --ignore-unfixed \
            --format sarif \
            --output "${RESULTS_DIR}/trivy-fs.sarif" \
            --exit-code ${{ inputs.enforce && '1' || '0' }} \
            "${SCAN_DIR}"

      - name: Run Trivy image scan
        if: ${{ inputs.enable_trivy && inputs.image_ref != '' }}
        shell: bash
        run: |
          trivy image \
            --severity "${{ inputs.fail_severity }}" \
            --ignore-unfixed \
            --format sarif \
            --output "${RESULTS_DIR}/trivy-image.sarif" \
            --exit-code ${{ inputs.enforce && '1' || '0' }} \
            "${{ inputs.image_ref }}"

      - name: Upload Checkov SARIF
        if: ${{ always() && needs.prepare.outputs.is_self == 'true' && inputs.enable_checkov && hashFiles('results/checkov.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/checkov.sarif
          category: checkov
          checkout_path: target

      - name: Upload Trivy filesystem SARIF
        if: ${{ always() && needs.prepare.outputs.is_self == 'true' && inputs.enable_trivy && hashFiles('results/trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/trivy-fs.sarif
          category: trivy-fs
          checkout_path: target

      - name: Upload Trivy image SARIF
        if: ${{ always() && needs.prepare.outputs.is_self == 'true' && inputs.enable_trivy && hashFiles('results/trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/trivy-image.sarif
          category: trivy-image
          checkout_path: target

      - name: Upload infrastructure scan artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-infrastructure
          if-no-files-found: ignore
          path: results/

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ inputs.enable_sbom }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ env.SCAN_DIR }}
          format: spdx-json
          artifact-name: tid-secureci-sbom.spdx.json
          dependency-snapshot: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ env.SCAN_DIR }}
          format: cyclonedx-json
          artifact-name: tid-secureci-sbom.cdx.json
          dependency-snapshot: false

  repo-posture:
    name: Repository Posture
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Run OpenSSF Scorecard
        shell: bash
        env:
          # Scorecard reads its GitHub token from GITHUB_AUTH_TOKEN. The default
          # workflow token can query any public repo; a PAT (checkout_token) is
          # only needed for private targets.
          GITHUB_AUTH_TOKEN: ${{ secrets.checkout_token || github.token }}
          TARGET: ${{ needs.prepare.outputs.repository }}
        run: |
          set -euo pipefail
          mkdir -p results
          SCORECARD_VERSION="5.5.0"
          curl -sSL -o scorecard.tar.gz \
            "https://github.com/ossf/scorecard/releases/download/v${SCORECARD_VERSION}/scorecard_${SCORECARD_VERSION}_linux_amd64.tar.gz"
          tar -xzf scorecard.tar.gz scorecard
          chmod +x scorecard
          # Best-effort: a clean public repo scores fine, but rate limits or a
          # private/empty target must not fail the whole pipeline. Fall back to
          # an empty object so the report can note that posture was unavailable.
          if ! ./scorecard --repo="github.com/${TARGET}" --format=json --show-details \
                > results/scorecard.json 2> scorecard.err; then
            echo "Scorecard did not complete:"
            cat scorecard.err || true
            echo '{}' > results/scorecard.json
          fi

      - name: Upload scorecard artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-scorecard
          path: results/scorecard.json

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - prepare
      - code-and-secrets
      - dependency-supply-chain
      - infrastructure-and-images
      - sbom
      - repo-posture
    if: ${{ always() }}
    steps:
      - name: Determine whether email is configured
        shell: bash
        env:
          SMTP_SERVER: ${{ secrets.smtp_server }}
          REPORT_OWNER: ${{ secrets.report_owner }}
        run: |
          if [ -n "${SMTP_SERVER}" ] && [ -n "${REPORT_OWNER}" ]; then
            echo "MAIL_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "MAIL_ENABLED=false" >> "$GITHUB_ENV"
          fi

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tid-secureci-*
          merge-multiple: true

      - name: Restore previous scan metrics
        # Rolling cache: each run saves under a unique run_id key, and the
        # prefix restore-key pulls the most recent prior run for this target.
        # This lets the report show a delta vs the last scan with no extra
        # secrets or write permissions. Failures here are non-fatal.
        uses: actions/cache@v6
        continue-on-error: true
        with:
          path: .tidstate
          key: tid-secureci-metrics-${{ needs.prepare.outputs.repository }}-${{ github.run_id }}
          restore-keys: |
            tid-secureci-metrics-${{ needs.prepare.outputs.repository }}-

      - name: Build report assets
        shell: bash
        # All workflow context is passed in via env rather than inlined as
        # ${{ }} in the script below. A run block that contains any ${{ }} is
        # compiled by GitHub as a single interpolation template capped at 21000
        # characters; this report script is larger than that, so keeping it
        # expression-free is what lets it grow without tripping that limit.
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REPO: ${{ needs.prepare.outputs.repository }}
          TARGET_REF: ${{ needs.prepare.outputs.ref }}
          REPORT_NAME_IN: ${{ inputs.report_name }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EVENT_NAME: ${{ github.event_name }}
          ENFORCE: ${{ inputs.enforce }}
          FAIL_SEVERITY: ${{ inputs.fail_severity }}
          R_CODE: ${{ needs.code-and-secrets.result }}
          R_DEP: ${{ needs.dependency-supply-chain.result }}
          R_INFRA: ${{ needs.infrastructure-and-images.result }}
          R_SBOM: ${{ needs.sbom.result }}
          R_POSTURE: ${{ needs.repo-posture.result }}
        run: |
          set -euo pipefail

          mkdir -p report

          count_sarif() {
            local file="$1"
            if [ -f "${file}" ] && jq empty "${file}" >/dev/null 2>&1; then
              jq '[.runs[]?.results[]?] | length' "${file}"
            else
              echo 0
            fi
          }

          semgrep_count=$(count_sarif artifacts/semgrep.sarif)
          gitleaks_count=$(count_sarif artifacts/gitleaks.sarif)
          osv_count=$(count_sarif artifacts/osv.sarif)
          checkov_count=$(count_sarif artifacts/checkov.sarif)
          trivy_fs_count=$(count_sarif artifacts/trivy-fs.sarif)
          trivy_image_count=$(count_sarif artifacts/trivy-image.sarif)
          total_count=$((semgrep_count + gitleaks_count + osv_count + checkov_count + trivy_fs_count + trivy_image_count))

          echo "TOTAL_FINDINGS=${total_count}" >> "${GITHUB_ENV}"

          # ---- Severity breakdown + risk grade --------------------------------
          # Prefer the security-severity of each rule (a CVSS-like 0-10 score);
          # fall back to the SARIF level when a scanner does not provide one. Emits
          # four space-separated counts: Critical High Medium Low.
          sev_counts() {
            local file="$1"
            if [ -f "${file}" ] && jq empty "${file}" >/dev/null 2>&1; then
              jq -r '
                [ .runs[]?
                  | ( reduce ((.tool.driver.rules // []) + ([ .tool.extensions[]?.rules // [] ] | add // []))[] as $r
                        ({}; . + { ($r.id // ""): ($r.properties."security-severity" // "") }) ) as $sev
                  | .results[]?
                  | ( (.properties."security-severity" // $sev[(.ruleId // .rule.id // "")] // "") | tostring ) as $ss
                  | ( if ($ss | test("^[0-9]+([.][0-9]+)?$")) then ($ss | tonumber)
                      else ( (.level // "warning") | if . == "error" then 7 elif . == "warning" then 4 else 1 end ) end ) as $score
                  | if $score >= 9 then "C" elif $score >= 7 then "H" elif $score >= 4 then "M" else "L" end ]
                | "\(map(select(.=="C"))|length) \(map(select(.=="H"))|length) \(map(select(.=="M"))|length) \(map(select(.=="L"))|length)"
              ' "${file}"
            else
              echo "0 0 0 0"
            fi
          }

          crit=0; high=0; med=0; low=0
          for f in semgrep gitleaks osv checkov trivy-fs trivy-image; do
            read -r c h m l < <(sev_counts "artifacts/${f}.sarif")
            crit=$((crit + c)); high=$((high + h)); med=$((med + m)); low=$((low + l))
          done

          # Weighted posture score, capped by the worst severity present so a
          # single Critical can never read as a passing grade.
          penalty=$(( crit*25 + high*8 + med*2 + low ))
          score=$(( 100 - penalty )); [ "${score}" -lt 0 ] && score=0
          if [ "${crit}" -gt 0 ] && [ "${score}" -gt 40 ]; then score=40; fi
          if [ "${high}" -gt 0 ] && [ "${score}" -gt 60 ]; then score=60; fi
          if   [ "${score}" -ge 90 ]; then grade="A"; grade_word="Strong";   grade_class="grade-a"
          elif [ "${score}" -ge 80 ]; then grade="B"; grade_word="Good";     grade_class="grade-b"
          elif [ "${score}" -ge 70 ]; then grade="C"; grade_word="Fair";     grade_class="grade-c"
          elif [ "${score}" -ge 50 ]; then grade="D"; grade_word="Weak";     grade_class="grade-d"
          else grade="F"; grade_word="Critical"; grade_class="grade-f"; fi
          echo "RISK_GRADE=${grade}" >> "${GITHUB_ENV}"

          # ---- OpenSSF Scorecard (repository posture) -------------------------
          scorecard_score="—"; scorecard_html=""; scorecard_md=""
          if [ -f artifacts/scorecard.json ] && jq -e '(.score? // null) != null' artifacts/scorecard.json >/dev/null 2>&1; then
            scorecard_score="$(jq -r '.score' artifacts/scorecard.json)"
            scorecard_html="$(jq -r '
              (.checks // []) | sort_by(.score // -1) | .[]
              | "<tr><td>" + (.name|@html) + "</td>"
                + "<td>" + (if (.score // -1) < 0 then "n/a" else ((.score|tostring) + "/10") end) + "</td>"
                + "<td>" + ((.reason // "")|@html) + "</td></tr>"
            ' artifacts/scorecard.json)"
            scorecard_md="$(jq -r '
              (.checks // []) | sort_by(.score // -1) | .[]
              | "| " + (.name) + " | " + (if (.score // -1) < 0 then "n/a" else ((.score|tostring) + "/10") end)
                + " | " + ((.reason // "") | gsub("\\|";"\\\\|") | gsub("\n";" ")) + " |"
            ' artifacts/scorecard.json)"
          fi
          [ -z "${scorecard_html}" ] && scorecard_html='<tr><td colspan="3">Repository posture score was not available for this target.</td></tr>'
          [ -z "${scorecard_md}" ] && scorecard_md='| — | — | Repository posture score was not available for this target. |'
          echo "SCORECARD_SCORE=${scorecard_score}" >> "${GITHUB_ENV}"

          # ---- Exploited & high-risk CVEs (CISA KEV + FIRST EPSS) -------------
          : > cve_ids.txt
          for f in osv trivy-fs trivy-image; do
            [ -f "artifacts/${f}.sarif" ] || continue
            grep -oE 'CVE-[0-9]{4}-[0-9]{4,}' "artifacts/${f}.sarif" 2>/dev/null >> cve_ids.txt || true
          done
          sort -u cve_ids.txt -o cve_ids.txt
          cve_total=$(awk 'END{print NR+0}' cve_ids.txt)

          : > kev_hits.txt; : > epss.tsv
          kev_count=0; epss_hi_count=0
          cve_html=""; cve_md=""
          if [ "${cve_total}" -gt 0 ]; then
            # CISA Known Exploited Vulnerabilities catalog (best-effort).
            curl -s --max-time 25 'https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json' 2>/dev/null \
              | jq -r '.vulnerabilities[]?.cveID' 2>/dev/null | sort -u > kev_all.txt || : > kev_all.txt
            [ -s kev_all.txt ] && comm -12 cve_ids.txt kev_all.txt > kev_hits.txt 2>/dev/null || true
            kev_count=$(awk 'END{print NR+0}' kev_hits.txt)

            # FIRST EPSS scores, queried in batches of 100 (URL length limit).
            split -l 100 cve_ids.txt epss_chunk_ || true
            for chunk in epss_chunk_*; do
              [ -f "${chunk}" ] || continue
              ids="$(paste -sd, "${chunk}")"
              curl -s --max-time 25 "https://api.first.org/data/v1/epss?cve=${ids}" 2>/dev/null \
                | jq -r '.data[]? | [.cve, .epss, .percentile] | @tsv' 2>/dev/null >> epss.tsv || true
            done

            # Join CVE list with KEV membership and EPSS score (single awk pass).
            awk -v OFS='\t' '
              FILENAME ~ /kev_hits/ { kev[$1]=1; next }
              FILENAME ~ /epss\.tsv/ { epss[$1]=$2; next }
              { print $1, (kev[$1] ? "yes" : "no"), (epss[$1]=="" ? "0" : epss[$1]) }
            ' kev_hits.txt epss.tsv cve_ids.txt > rows.tsv

            epss_hi_count=$(awk -F'\t' '$3+0>=0.10{n++} END{print n+0}' rows.tsv)

            # Keep CVEs that are exploited (KEV) or have EPSS >= 10%, worst first.
            cve_html="$(jq -R -s -r '
              [ split("\n")[] | select(length>0) | split("\t") | {cve:.[0], kev:.[1], epss:(.[2]|tonumber)} ]
              | map(select(.kev=="yes" or .epss>=0.10)) | sort_by(-(.epss)) | .[:25]
              | map("<tr><td><a href=\"https://nvd.nist.gov/vuln/detail/" + .cve + "\"><code>" + .cve + "</code></a></td>"
                    + "<td>" + (if .kev=="yes" then "<span class=\"sev sev-error\">KEV</span>" else "&mdash;" end) + "</td>"
                    + "<td>" + ((.epss*100)|floor|tostring) + "%</td></tr>") | join("\n")
            ' rows.tsv)"
            cve_md="$(jq -R -s -r '
              [ split("\n")[] | select(length>0) | split("\t") | {cve:.[0], kev:.[1], epss:(.[2]|tonumber)} ]
              | map(select(.kev=="yes" or .epss>=0.10)) | sort_by(-(.epss)) | .[:25]
              | map("| `" + .cve + "` | " + (if .kev=="yes" then "KEV" else "—" end) + " | " + ((.epss*100)|floor|tostring) + "% |") | join("\n")
            ' rows.tsv)"
          fi
          [ -z "${cve_html}" ] && cve_html='<tr><td colspan="3">No exploited or high-risk CVEs were identified among the dependency and image findings.</td></tr>'
          [ -z "${cve_md}" ] && cve_md='| — | — | No exploited or high-risk CVEs identified. |'

          # ---- Trend vs the previous scan of this repository ------------------
          delta_fmt() { if [ "$1" -gt "$2" ]; then echo "+$(( $1 - $2 ))"; elif [ "$1" -lt "$2" ]; then echo "$(( $1 - $2 ))"; else echo "no change"; fi; }
          if [ -f .tidstate/metrics.json ] && jq empty .tidstate/metrics.json >/dev/null 2>&1; then
            prev_total="$(jq -r '.total // 0' .tidstate/metrics.json)"
            prev_crit="$(jq -r '.critical // 0' .tidstate/metrics.json)"
            prev_high="$(jq -r '.high // 0' .tidstate/metrics.json)"
            prev_when="$(jq -r '.date // ""' .tidstate/metrics.json)"
            when_phrase=""
            [ -n "${prev_when}" ] && when_phrase=" on ${prev_when}"
            trend_text="Compared with the previous scan${when_phrase}: total findings ${total_count} ($(delta_fmt ${total_count} ${prev_total}) vs ${prev_total}), Critical ${crit} ($(delta_fmt ${crit} ${prev_crit})), High ${high} ($(delta_fmt ${high} ${prev_high}))."
          else
            trend_text="No previous scan is on record for this repository &mdash; these results are the baseline for future comparisons."
          fi

          # Persist the metrics from this scan for the next run trend comparison.
          mkdir -p .tidstate
          metrics_date="$(date -u '+%Y-%m-%d %H:%M UTC')"
          jq -n --argjson total "${total_count}" --argjson critical "${crit}" --argjson high "${high}" \
                --argjson medium "${med}" --argjson low "${low}" --arg date "${metrics_date}" --arg run "${RUN_ID}" \
                '{total:$total, critical:$critical, high:$high, medium:$medium, low:$low, date:$date, run:$run}' \
                > .tidstate/metrics.json

          # ---- Detailed findings: one row per issue, with a link to review it ----
          link_repo="${TARGET_REPO}"
          link_ref="${TARGET_REF}"
          [ -z "${link_ref}" ] && link_ref="HEAD"

          # ---- Repository metadata (best-effort; public repos via the API) ----
          repo_json="$(gh api "repos/${link_repo}" 2>/dev/null || echo '{}')"
          rj() { printf '%s' "${repo_json}" | jq -r "$1" 2>/dev/null; }
          repo_url="$(rj '.html_url // ""')"
          [ -z "${repo_url}" ] && repo_url="https://github.com/${link_repo}"
          repo_desc="$(rj '(.description // "—")')"
          repo_homepage="$(rj '(.homepage // "")')"
          repo_lang="$(rj '(.language // "—")')"
          repo_branch="$(rj '(.default_branch // "—")')"
          repo_license="$(rj '(.license.spdx_id // .license.name // "—")')"
          repo_stars="$(rj '(.stargazers_count // 0)')"
          repo_forks="$(rj '(.forks_count // 0)')"
          repo_issues="$(rj '(.open_issues_count // 0)')"
          repo_updated="$(rj '(.pushed_at // .updated_at // "—")')"
          repo_topics="$(rj '((.topics // []) | join(", "))')"
          [ -z "${repo_topics}" ] && repo_topics="—"
          repo_visibility="$(rj 'if .private == true then "private" elif .private == false then "public" else "—" end')"
          # HTML-escaped variants for free text
          repo_desc_html="$(printf '%s' "${repo_json}" | jq -r '(.description // "—") | @html' 2>/dev/null)"
          repo_topics_html="$(printf '%s' "${repo_json}" | jq -r '((.topics // []) | join(", ")) | @html' 2>/dev/null)"
          [ -z "${repo_desc_html}" ] && repo_desc_html="—"
          [ -z "${repo_topics_html}" ] && repo_topics_html="—"
          # Markdown-safe description (escape pipes)
          repo_desc_md="$(printf '%s' "${repo_desc}" | sed 's/|/\\|/g')"
          homepage_md="—"; homepage_html="&mdash;"
          if [ -n "${repo_homepage}" ]; then
            homepage_md="[${repo_homepage}](${repo_homepage})"
            homepage_html="<a href=\"${repo_homepage}\">${repo_homepage}</a>"
          fi
          # Human-friendly ref label (blank ref means the target's default branch)
          ref_display="${TARGET_REF}"
          [ -z "${ref_display}" ] && ref_display="${repo_branch} (default branch)"

          html_jq='
            .runs[]?.results[]? as $r
            | ($r.ruleId // "-") as $rule
            | ($r.level // "warning") as $level
            | (($r.message.text // "") | gsub("\n";" ")) as $msg
            | ($r.locations[0].physicalLocation.artifactLocation.uri // "") as $rawuri
            | ($r.locations[0].physicalLocation.region.startLine // 0) as $line
            | ($rawuri | sub("^file://";"") | sub("^.*/target/";"") | sub("^target/";"")) as $path
            | (if $path == "" then "" else ($path + (if $line > 0 then ":" + ($line|tostring) else "" end)) end) as $loc
            | (if $kind == "osv" then "https://osv.dev/vulnerability/" + $rule
                elif $path != "" then "https://github.com/" + $repo + "/blob/" + $ref + "/" + $path + (if $line > 0 then "#L" + ($line|tostring) else "" end)
                else "" end) as $url
            | "<tr><td>" + $scanner + "</td>"
              + "<td><span class=\"sev sev-" + $level + "\">" + $level + "</span></td>"
              + "<td><code>" + ($rule|@html) + "</code></td>"
              + "<td>" + (if $loc == "" then "&mdash;" else ($loc|@html) end) + "</td>"
              + "<td>" + ($msg|@html) + "</td>"
              + "<td>" + (if $url == "" then "&mdash;" else "<a href=\"" + $url + "\">review</a>" end) + "</td></tr>"
          '

          md_jq='
            .runs[]?.results[]? as $r
            | ($r.ruleId // "-") as $rule
            | ($r.level // "warning") as $level
            | (($r.message.text // "") | gsub("\n";" ") | gsub("\\|";"\\\\|")) as $msg
            | ($r.locations[0].physicalLocation.artifactLocation.uri // "") as $rawuri
            | ($r.locations[0].physicalLocation.region.startLine // 0) as $line
            | ($rawuri | sub("^file://";"") | sub("^.*/target/";"") | sub("^target/";"")) as $path
            | (if $path == "" then "" else ($path + (if $line > 0 then ":" + ($line|tostring) else "" end)) end) as $loc
            | (if $kind == "osv" then "https://osv.dev/vulnerability/" + $rule
                elif $path != "" then "https://github.com/" + $repo + "/blob/" + $ref + "/" + $path + (if $line > 0 then "#L" + ($line|tostring) else "" end)
                else "" end) as $url
            | "| " + $scanner + " | " + $level + " | `" + $rule + "` | " + (if $loc == "" then " " else $loc end) + " | " + $msg + " | " + (if $url == "" then " " else ("[review](" + $url + ")") end) + " |"
          '

          : > report/findings_html.frag
          : > report/findings_md.frag
          gen_findings() {
            local file="$1" label="$2" kind="$3"
            [ -f "artifacts/${file}" ] || return 0
            jq empty "artifacts/${file}" >/dev/null 2>&1 || return 0
            jq -r --arg scanner "${label}" --arg kind "${kind}" --arg repo "${link_repo}" --arg ref "${link_ref}" "${html_jq}" "artifacts/${file}" >> report/findings_html.frag || true
            jq -r --arg scanner "${label}" --arg kind "${kind}" --arg repo "${link_repo}" --arg ref "${link_ref}" "${md_jq}"   "artifacts/${file}" >> report/findings_md.frag || true
          }
          gen_findings semgrep.sarif     "Semgrep"     code
          gen_findings gitleaks.sarif    "Gitleaks"    secret
          gen_findings osv.sarif         "OSV"         osv
          gen_findings checkov.sarif     "Checkov"     iac
          gen_findings trivy-fs.sarif    "Trivy FS"    fs
          gen_findings trivy-image.sarif "Trivy Image" image

          if [ ! -s report/findings_html.frag ]; then
            echo '<tr><td colspan="6">No findings were reported by any scanner.</td></tr>' > report/findings_html.frag
          fi
          if [ ! -s report/findings_md.frag ]; then
            echo '| — | — | — | — | No findings were reported by any scanner. | — |' > report/findings_md.frag
          fi
          FINDINGS_HTML="$(cat report/findings_html.frag)"
          FINDINGS_MD="$(cat report/findings_md.frag)"

          report_name="${REPORT_NAME_IN}"
          report_date="$(date -u '+%d %B %Y, %H:%M UTC')"
          report_id="${RUN_ID}-${RUN_ATTEMPT}"
          trigger="${EVENT_NAME}"

          echo "REPORT_NAME=${report_name}" >> "${GITHUB_ENV}"
          echo "REPORT_ID=${report_id}" >> "${GITHUB_ENV}"

          cat > report/report.md <<EOF
          ---------------------------------------------------------------
                                  TIDHQ.NETWORK
          ---------------------------------------------------------------

          # ${report_name}

          **${TARGET_REPO}**

          Report ID: ${report_id}
          Date: ${report_date}
          Prepared by: TID-SecureCI
          Classification: Confidential

          ---------------------------------------------------------------

          ## Preface

          This document is an automated security assessment produced by the
          TIDHQ.NETWORK TID-SecureCI pipeline. It consolidates the output of
          several independent scanners into a single record for the repository
          and revision named above. The scan was triggered by a \`${trigger}\`
          event. Findings here are a point-in-time snapshot; authoritative,
          line-level results live in the GitHub Security tab and in the raw
          SARIF artifacts attached to this report.

          ## Table of Contents

          1. Scan & Repository Overview
          2. Risk Posture
          3. Findings Snapshot
          4. Exploited & High-Risk CVEs
          5. Repository Posture (OpenSSF Scorecard)
          6. Detailed Findings
          7. Job Status
          8. Where To Look
          9. Reading The Results
          10. Scan Map

          ---------------------------------------------------------------

          ## 1. Scan & Repository Overview

          | Field | Value |
          | --- | --- |
          | Repository | [${TARGET_REPO}](${repo_url}) |
          | Description | ${repo_desc_md} |
          | Ref scanned | \`${ref_display}\` |
          | Default branch | \`${repo_branch}\` |
          | Primary language | ${repo_lang} |
          | Topics | ${repo_topics} |
          | Visibility | ${repo_visibility} |
          | Stars / Forks / Open issues | ${repo_stars} / ${repo_forks} / ${repo_issues} |
          | License | ${repo_license} |
          | Homepage | ${homepage_md} |
          | Last pushed | ${repo_updated} |
          | Trigger | \`${trigger}\` |
          | Enforce mode | \`${ENFORCE}\` |
          | Severity gate | \`${FAIL_SEVERITY}\` |

          **Quick links:** [Code](${repo_url}) &middot; [Issues](${repo_url}/issues) &middot; [Pull requests](${repo_url}/pulls) &middot; [Commits](${repo_url}/commits) &middot; [Security](${repo_url}/security) &middot; [Dependency graph](${repo_url}/network/dependencies)

          ## 2. Risk Posture

          **Overall grade: ${grade} (${grade_word}) &mdash; posture score ${score}/100**

          | Severity | Count |
          | --- | ---: |
          | Critical | ${crit} |
          | High | ${high} |
          | Medium | ${med} |
          | Low | ${low} |
          | Total | ${total_count} |

          Severity comes from the per-rule security-severity (CVSS-like) score
          where available, otherwise inferred from the scanner level. The grade
          is capped by the worst severity present, so any Critical finding limits
          the report to a failing grade regardless of volume.

          **Trend:** ${trend_text}

          ## 3. Findings Snapshot

          | Scanner | Findings in artifact |
          | --- | ---: |
          | Semgrep | ${semgrep_count} |
          | Gitleaks | ${gitleaks_count} |
          | OSV-Scanner | ${osv_count} |
          | Checkov | ${checkov_count} |
          | Trivy FS | ${trivy_fs_count} |
          | Trivy Image | ${trivy_image_count} |
          | Total | ${total_count} |

          ## 4. Exploited & High-Risk CVEs

          Of ${cve_total} unique CVEs across the dependency and image scans,
          ${kev_count} are in the CISA Known Exploited Vulnerabilities catalog and
          ${epss_hi_count} have an EPSS exploitation probability of 10% or higher.
          The highest-risk are listed below (worst first, top 25).

          | CVE | CISA KEV | EPSS |
          | --- | --- | ---: |
          ${cve_md}

          ## 5. Repository Posture (OpenSSF Scorecard)

          **Aggregate Scorecard: ${scorecard_score}/10.** Scores reflect repository
          security hygiene (branch protection, dependency pinning, dangerous
          workflows, maintenance, and more) rather than findings in the code.

          | Check | Score | Reason |
          | --- | --- | --- |
          ${scorecard_md}

          ## 6. Detailed Findings

          Every issue each scanner reported, with a link to review it in context
          (source line on GitHub, or the advisory for a vulnerable dependency).

          | Scanner | Severity | Rule | Location | Detail | Review |
          | --- | --- | --- | --- | --- | --- |
          ${FINDINGS_MD}

          ## 7. Job Status

          | Job | Result |
          | --- | --- |
          | Code And Secrets | \`${R_CODE}\` |
          | Dependency And Supply Chain | \`${R_DEP}\` |
          | Infrastructure And Images | \`${R_INFRA}\` |
          | SBOM | \`${R_SBOM}\` |
          | Repository Posture | \`${R_POSTURE}\` |

          ## 8. Where To Look

          1. Open **Security -> Code scanning alerts** for line-level findings.
          2. Open **Actions -> this run -> Artifacts** for raw SARIF and SBOM downloads.
          3. Use the SBOM artifacts for inventory, license, and supply-chain review.

          ## 9. Reading The Results

          - Semgrep surfaces code patterns that may lead to security issues or insecure DOM handling.
          - Gitleaks checks for exposed credentials or tokens in git history.
          - OSV maps lockfiles and manifests to published dependency vulnerabilities.
          - Checkov and Trivy cover infrastructure, misconfigurations, secrets, and package risk.
          - SBOM artifacts show what is in the build even when no alert is raised.
          - The risk grade and CVE enrichment (CISA KEV, FIRST EPSS) help triage which findings to fix first.

          ## 10. Scan Map

          \`\`\`mermaid
          flowchart LR
            A[Source Repo] --> B[Semgrep + Gitleaks]
            A --> C[OSV Dependency Scan]
            A --> D[Checkov + Trivy]
            A --> E[SBOM Generation]
            B --> F[GitHub Code Scanning]
            C --> F
            D --> F
            B --> G[Workflow Artifacts]
            C --> G
            D --> G
            E --> G
          \`\`\`

          ---------------------------------------------------------------
          TIDHQ.NETWORK | Confidential | Report ID ${report_id}
          EOF

          cat > report/report.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>${report_name} - TIDHQ.NETWORK</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #2e3338;
                --panel: #ffffff;
                --ink: #102418;
                --muted: #486153;
                --line: #d6e3d7;
                --accent: #14532d;
              }
              body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, sans-serif;
                background: var(--bg);
                color: var(--ink);
              }
              .wrap {
                max-width: 980px;
                margin: 0 auto;
                padding: 32px 20px 48px;
              }
              .cover {
                background: var(--accent);
                color: #f3fbf4;
                border-radius: 18px;
                padding: 64px 40px;
                margin-bottom: 18px;
                text-align: center;
              }
              .brand {
                font-size: 16px;
                letter-spacing: 0.32em;
                text-transform: uppercase;
                opacity: 0.85;
              }
              .cover h1 {
                font-size: 40px;
                margin: 18px 0 8px;
              }
              .cover .repo {
                font-size: 18px;
                opacity: 0.9;
                margin-bottom: 28px;
              }
              .cover .meta {
                display: inline-block;
                text-align: left;
                font-size: 14px;
                line-height: 1.9;
                opacity: 0.92;
              }
              .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 18px;
                box-shadow: 0 12px 30px rgba(16, 36, 24, 0.06);
                padding: 24px;
                margin-bottom: 18px;
              }
              h2 {
                margin: 0 0 12px;
                font-size: 20px;
              }
              .sub { color: var(--muted); margin-bottom: 8px; }
              table { width: 100%; border-collapse: collapse; margin-top: 8px; }
              th, td {
                text-align: left;
                padding: 8px 10px;
                border-bottom: 1px solid var(--line);
                font-size: 14px;
              }
              td.num { text-align: right; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
                margin-top: 18px;
              }
              .card {
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 14px;
                background: #fbfdf9;
              }
              .label {
                font-size: 12px;
                text-transform: uppercase;
                color: var(--muted);
                letter-spacing: 0.08em;
              }
              .value { font-size: 28px; font-weight: 700; margin-top: 8px; }
              ol, ul { margin: 10px 0 0 20px; padding: 0; }
              code { background: #eef6ed; padding: 2px 6px; border-radius: 6px; }
              .panel { overflow: hidden; }
              .table-scroll { width: 100%; overflow-x: auto; }
              table.findings { font-size: 13px; table-layout: fixed; }
              table.findings th, table.findings td {
                vertical-align: top;
                overflow-wrap: anywhere;
                word-break: break-word;
              }
              table.findings code {
                white-space: normal;
                overflow-wrap: anywhere;
                word-break: break-all;
                background: #eef6ed;
              }
              table.findings th:nth-child(1), table.findings td:nth-child(1) { width: 9%; }
              table.findings th:nth-child(2), table.findings td:nth-child(2) { width: 9%; }
              table.findings th:nth-child(3), table.findings td:nth-child(3) { width: 22%; }
              table.findings th:nth-child(4), table.findings td:nth-child(4) { width: 16%; }
              table.findings th:nth-child(5), table.findings td:nth-child(5) { width: 35%; color: var(--muted); }
              table.findings th:nth-child(6), table.findings td:nth-child(6) { width: 9%; }
              .sev {
                display: inline-block;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                padding: 2px 8px;
                border-radius: 999px;
                background: #e5e9ee;
                color: #2e3338;
              }
              .sev-error { background: #fde2e1; color: #8a1c13; }
              .sev-warning { background: #fdeccf; color: #8a5a08; }
              .sev-note { background: #dbeafe; color: #0b4a8a; }
              .findings a { color: var(--accent); font-weight: 600; }
              .posture {
                display: flex;
                align-items: center;
                gap: 18px;
                margin-bottom: 14px;
              }
              .grade {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 64px;
                height: 64px;
                border-radius: 16px;
                font-size: 34px;
                font-weight: 800;
                color: #fff;
                flex: 0 0 auto;
              }
              .grade-a { background: #15803d; }
              .grade-b { background: #4d7c0f; }
              .grade-c { background: #a16207; }
              .grade-d { background: #c2410c; }
              .grade-f { background: #b91c1c; }
              .posture .pmeta { font-size: 14px; color: var(--muted); }
              .posture .pmeta strong { color: var(--ink); font-size: 16px; }
              .trend { margin-top: 12px; font-size: 14px; color: var(--muted); }
              .footer {
                text-align: center;
                color: #c3c8cc;
                font-size: 12px;
                letter-spacing: 0.06em;
                padding: 12px 0 0;
              }
              @media print {
                .cover, .preface { page-break-after: always; }
                .panel { page-break-inside: avoid; }
              }
            </style>
          </head>
          <body>
            <div class="wrap">
              <section class="cover">
                <div class="brand">TIDHQ.NETWORK</div>
                <h1>${report_name}</h1>
                <div class="repo">${TARGET_REPO}</div>
                <div class="meta">
                  Report ID: ${report_id}<br>
                  Date: ${report_date}<br>
                  Prepared by: TID-SecureCI<br>
                  Classification: Confidential
                </div>
              </section>

              <section class="panel preface">
                <h2>Preface</h2>
                <p>This document is an automated security assessment produced by the
                TIDHQ.NETWORK TID-SecureCI pipeline. It consolidates the output of
                several independent scanners into a single record for the repository
                and revision shown on the cover. This scan was triggered by a
                <code>${trigger}</code> event. Findings here are a point-in-time
                snapshot; authoritative, line-level results live in the GitHub
                Security tab and in the raw SARIF artifacts attached to this report.</p>
                <p><strong>Contents:</strong></p>
                <ol>
                  <li>Scan &amp; Repository Overview</li>
                  <li>Risk Posture</li>
                  <li>Findings Snapshot</li>
                  <li>Exploited &amp; High-Risk CVEs</li>
                  <li>Repository Posture (OpenSSF Scorecard)</li>
                  <li>Detailed Findings</li>
                  <li>Job Status</li>
                  <li>Where To Look</li>
                  <li>Reading The Results</li>
                </ol>
              </section>

              <section class="panel">
                <h2>1. Scan &amp; Repository Overview</h2>
                <table>
                  <tr><th>Repository</th><td><a href="${repo_url}">${TARGET_REPO}</a></td></tr>
                  <tr><th>Description</th><td>${repo_desc_html}</td></tr>
                  <tr><th>Ref scanned</th><td><code>${ref_display}</code></td></tr>
                  <tr><th>Default branch</th><td><code>${repo_branch}</code></td></tr>
                  <tr><th>Primary language</th><td>${repo_lang}</td></tr>
                  <tr><th>Topics</th><td>${repo_topics_html}</td></tr>
                  <tr><th>Visibility</th><td>${repo_visibility}</td></tr>
                  <tr><th>Stars / Forks / Open issues</th><td>${repo_stars} / ${repo_forks} / ${repo_issues}</td></tr>
                  <tr><th>License</th><td>${repo_license}</td></tr>
                  <tr><th>Homepage</th><td>${homepage_html}</td></tr>
                  <tr><th>Last pushed</th><td>${repo_updated}</td></tr>
                  <tr><th>Trigger</th><td>${trigger}</td></tr>
                  <tr><th>Enforce mode</th><td>${ENFORCE}</td></tr>
                  <tr><th>Severity gate</th><td>${FAIL_SEVERITY}</td></tr>
                </table>
                <p class="sub" style="margin-top:14px;">
                  <strong>Quick links:</strong>
                  <a href="${repo_url}">Code</a> &middot;
                  <a href="${repo_url}/issues">Issues</a> &middot;
                  <a href="${repo_url}/pulls">Pull requests</a> &middot;
                  <a href="${repo_url}/commits">Commits</a> &middot;
                  <a href="${repo_url}/security">Security</a> &middot;
                  <a href="${repo_url}/network/dependencies">Dependency graph</a>
                </p>
              </section>

              <section class="panel">
                <h2>2. Risk Posture</h2>
                <div class="posture">
                  <span class="grade ${grade_class}">${grade}</span>
                  <span class="pmeta"><strong>${grade_word}</strong> &mdash; posture score ${score}/100<br>
                  Grade is capped by the worst severity present, so any Critical finding limits the report to a failing grade.</span>
                </div>
                <div class="grid">
                  <div class="card"><div class="label">Critical</div><div class="value">${crit}</div></div>
                  <div class="card"><div class="label">High</div><div class="value">${high}</div></div>
                  <div class="card"><div class="label">Medium</div><div class="value">${med}</div></div>
                  <div class="card"><div class="label">Low</div><div class="value">${low}</div></div>
                  <div class="card"><div class="label">Total</div><div class="value">${total_count}</div></div>
                </div>
                <p class="trend"><strong>Trend:</strong> ${trend_text}</p>
              </section>

              <section class="panel">
                <h2>3. Findings Snapshot</h2>
                <div class="grid">
                  <div class="card"><div class="label">Semgrep</div><div class="value">${semgrep_count}</div></div>
                  <div class="card"><div class="label">Gitleaks</div><div class="value">${gitleaks_count}</div></div>
                  <div class="card"><div class="label">OSV</div><div class="value">${osv_count}</div></div>
                  <div class="card"><div class="label">Checkov</div><div class="value">${checkov_count}</div></div>
                  <div class="card"><div class="label">Trivy FS</div><div class="value">${trivy_fs_count}</div></div>
                  <div class="card"><div class="label">Total</div><div class="value">${total_count}</div></div>
                </div>
              </section>

              <section class="panel">
                <h2>4. Exploited &amp; High-Risk CVEs</h2>
                <p class="sub">Of ${cve_total} unique CVEs across the dependency and image scans,
                <strong>${kev_count}</strong> are in the CISA Known Exploited Vulnerabilities catalog and
                <strong>${epss_hi_count}</strong> have an EPSS exploitation probability of 10% or higher.
                Highest-risk first (top 25).</p>
                <div class="table-scroll">
                  <table class="findings">
                    <thead><tr><th>CVE</th><th>CISA KEV</th><th>EPSS</th></tr></thead>
                    <tbody>
                      ${cve_html}
                    </tbody>
                  </table>
                </div>
              </section>

              <section class="panel">
                <h2>5. Repository Posture (OpenSSF Scorecard)</h2>
                <p class="sub">Aggregate Scorecard: <strong>${scorecard_score}/10</strong>. These checks
                reflect repository security hygiene &mdash; branch protection, dependency pinning,
                dangerous workflows, maintenance &mdash; rather than findings in the code.</p>
                <div class="table-scroll">
                  <table class="findings">
                    <thead><tr><th>Check</th><th>Score</th><th>Reason</th></tr></thead>
                    <tbody>
                      ${scorecard_html}
                    </tbody>
                  </table>
                </div>
              </section>

              <section class="panel">
                <h2>6. Detailed Findings</h2>
                <p class="sub">Every issue each scanner reported, with a link to review it in
                context &mdash; the source line on GitHub, or the advisory for a vulnerable dependency.</p>
                <div class="table-scroll">
                  <table class="findings">
                    <thead>
                      <tr><th>Scanner</th><th>Severity</th><th>Rule</th><th>Location</th><th>Detail</th><th>Review</th></tr>
                    </thead>
                    <tbody>
                      ${FINDINGS_HTML}
                    </tbody>
                  </table>
                </div>
              </section>

              <section class="panel">
                <h2>7. Job Status</h2>
                <table>
                  <tr><th>Code And Secrets</th><td>${R_CODE}</td></tr>
                  <tr><th>Dependency And Supply Chain</th><td>${R_DEP}</td></tr>
                  <tr><th>Infrastructure And Images</th><td>${R_INFRA}</td></tr>
                  <tr><th>SBOM</th><td>${R_SBOM}</td></tr>
                  <tr><th>Repository Posture</th><td>${R_POSTURE}</td></tr>
                </table>
              </section>

              <section class="panel">
                <h2>8. Where To Look</h2>
                <ol>
                  <li>Open <code>Security -&gt; Code scanning alerts</code> for line-level issues.</li>
                  <li>Open <code>Actions -&gt; this run -&gt; Artifacts</code> for SARIF and SBOM files.</li>
                  <li>Use SPDX and CycloneDX SBOM files for dependency inventory and supply-chain review.</li>
                </ol>
              </section>

              <section class="panel">
                <h2>9. Reading The Results</h2>
                <ul>
                  <li>Semgrep checks application code and custom AI/ML guardrails.</li>
                  <li>Gitleaks checks git history for secrets.</li>
                  <li>OSV checks manifests and lockfiles against vulnerability advisories.</li>
                  <li>Checkov and Trivy check infrastructure, misconfigurations, and package risk.</li>
                  <li>SBOM artifacts show what is in the build even when no alert is raised.</li>
                  <li>The risk grade and CVE enrichment (CISA KEV, FIRST EPSS) help triage what to fix first.</li>
                </ul>
              </section>

              <div class="footer">TIDHQ.NETWORK &middot; Confidential &middot; Report ID ${report_id}</div>
            </div>
          </body>
          </html>
          EOF

      - name: Upload summary report artifact
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-report
          path: report/

      - name: Email report
        if: ${{ env.MAIL_ENABLED == 'true' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.smtp_server }}
          server_port: ${{ secrets.smtp_port || '587' }}
          secure: ${{ (secrets.smtp_port || '587') == '465' }}
          username: ${{ secrets.smtp_username }}
          password: ${{ secrets.smtp_password }}
          from: TIDHQ.NETWORK SecureCI <${{ secrets.mail_from || secrets.smtp_username }}>
          to: ${{ inputs.report_recipient || secrets.report_owner }}
          bcc: ${{ inputs.report_recipient != '' && secrets.report_owner || '' }}
          subject: "TIDHQ.NETWORK | ${{ env.REPORT_NAME }} - ${{ needs.prepare.outputs.repository }} (Grade ${{ env.RISK_GRADE }}, ${{ env.TOTAL_FINDINGS }} findings)"
          # Read the body from a file rather than inlining it. Passing the full
          # report HTML through an env var trips the 128 KB per-string exec limit
          # (MAX_ARG_STRLEN) on larger reports, which failed the send entirely.
          html_body: file://report/report.html
          attachments: report/report.html,report/report.md

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## TID-SecureCI"
            echo
            echo "- Repository: \`${{ needs.prepare.outputs.repository }}\`"
            echo "- Ref: \`${{ needs.prepare.outputs.ref }}\`"
            echo "- Enforce mode: \`${{ inputs.enforce }}\`"
            echo "- Severity gate: \`${{ inputs.fail_severity }}\`"
            echo
            echo "### Scan Map"
            echo
            echo '```mermaid'
            echo 'flowchart LR'
            echo '  A[Source Repo] --> B[Semgrep and Gitleaks]'
            echo '  A --> C[OSV Dependency Scan]'
            echo '  A --> D[Checkov and Trivy]'
            echo '  A --> E[SBOM Generation]'
            echo '  B --> F[GitHub Code Scanning]'
            echo '  C --> F'
            echo '  D --> F'
            echo '  B --> G[Workflow Artifacts]'
            echo '  C --> G'
            echo '  D --> G'
            echo '  E --> G'
            echo '```'
            echo
            echo "### What To Review"
            echo
            echo "1. Open **Security -> Code scanning alerts** for issue-by-issue findings."
            echo "2. Open **Actions -> this run -> Artifacts** for raw SARIF, SBOMs, and the downloadable HTML/Markdown report."
            echo "3. Use the SBOM files to review the software inventory even when alerts are quiet."
            echo
            echo "### Job Results"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| Code And Secrets | \`${{ needs.code-and-secrets.result }}\` |"
            echo "| Dependency And Supply Chain | \`${{ needs.dependency-supply-chain.result }}\` |"
            echo "| Infrastructure And Images | \`${{ needs.infrastructure-and-images.result }}\` |"
            echo "| SBOM | \`${{ needs.sbom.result }}\` |"
            echo
            echo "### Recommended GitHub Settings"
            echo
            echo "- CodeQL default setup"
            echo "- Dependabot alerts and security updates"
            echo "- Secret scanning and push protection"
          } >> "${GITHUB_STEP_SUMMARY}"
