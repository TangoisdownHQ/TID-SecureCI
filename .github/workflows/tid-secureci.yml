                font-size: 14px;
                line-height: 1.9;
                opacity: 0.92;
              }
              .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 18px;
                box-shadow: 0 12px 30px rgba(16, 36, 24, 0.06);
                padding: 24px;
                margin-bottom: 18px;
              }
              h2 {
                margin: 0 0 12px;
                font-size: 20px;
              }
              .sub { color: var(--muted); margin-bottom: 8px; }
              table { width: 100%; border-collapse: collapse; margin-top: 8px; }
              th, td {
                text-align: left;
                padding: 8px 10px;
                border-bottom: 1px solid var(--line);
                font-size: 14px;
              }
              td.num { text-align: right; }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
                margin-top: 18px;
