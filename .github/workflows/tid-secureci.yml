name: TID-SecureCI

on:
  workflow_call:
    inputs:
      target_repository:
        description: "owner/repo to scan. Defaults to the caller repository."
        required: false
        type: string
        default: ""
      target_ref:
        description: "Git ref, branch, or SHA to scan. Defaults to the caller SHA."
        required: false
        type: string
        default: ""
      image_ref:
        description: "Optional container image to scan with Trivy."
        required: false
        type: string
        default: ""
      fail_severity:
        description: "Severity threshold for blocking scans."
        required: false
        type: string
        default: "HIGH,CRITICAL"
      enforce:
        description: "Fail the workflow on findings. Start with false, then turn on after tuning."
        required: false
        type: boolean
        default: false
      enable_semgrep:
        required: false
        type: boolean
        default: true
      enable_gitleaks:
        required: false
        type: boolean
        default: true
      enable_osv:
        required: false
        type: boolean
        default: true
      enable_checkov:
        required: false
        type: boolean
        default: true
      enable_trivy:
        required: false
        type: boolean
        default: true
      enable_sbom:
        required: false
        type: boolean
        default: true
      upload_artifacts:
        required: false
        type: boolean
        default: true
    secrets:
      checkout_token:
        required: false
      semgrep_app_token:
        required: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: tid-secureci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

env:
  SCAN_DIR: target
  RESULTS_DIR: results
  GITLEAKS_VERSION: 8.24.2
  OSV_SCANNER_VERSION: 2.3.0
  TRIVY_VERSION: 0.67.2

jobs:
  prepare:
    name: Prepare Target
    runs-on: ubuntu-latest
    outputs:
      repository: ${{ steps.resolve.outputs.repository }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          repository="${{ inputs.target_repository }}"
          ref="${{ inputs.target_ref }}"

          if [ -z "${repository}" ]; then
            repository="${{ github.repository }}"
          fi

          if [ -z "${ref}" ]; then
            ref="${{ github.sha }}"
          fi

          echo "repository=${repository}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ github.event_name == 'pull_request' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        continue-on-error: ${{ !inputs.enforce }}
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          allow-licenses: MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,Python-2.0,Python-2.0.1,MPL-2.0

  code-and-secrets:
    name: Code And Secrets
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Prepare results directory
        shell: bash
        run: mkdir -p "${RESULTS_DIR}"

      - name: Install Semgrep
        if: ${{ inputs.enable_semgrep }}
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install semgrep

      - name: Create custom Semgrep rules
        if: ${{ inputs.enable_semgrep }}
        shell: bash
        run: |
          cat > "${RUNNER_TEMP}/semgrep-ml.yml" <<'YAML'
          rules:
            - id: tid-llm-trust-remote-code
              message: "Avoid `trust_remote_code=True` when loading external models."
              severity: ERROR
              languages: [python]
              pattern: trust_remote_code=True
              metadata:
                category: security
            - id: tid-python-pickle-load
              message: "`pickle.load` on untrusted data is unsafe."
              severity: ERROR
              languages: [python]
              pattern: pickle.load(...)
              metadata:
                category: security
            - id: tid-python-joblib-load
              message: "`joblib.load` can deserialize untrusted code."
              severity: WARNING
              languages: [python]
              pattern: joblib.load(...)
              metadata:
                category: security
            - id: tid-python-torch-load
              message: "Review `torch.load` inputs for untrusted model artifacts."
              severity: WARNING
              languages: [python]
              pattern: torch.load(...)
              metadata:
                category: security
            - id: tid-python-subprocess-shell
              message: "`shell=True` can allow command injection."
              severity: ERROR
              languages: [python]
              patterns:
                - pattern: subprocess.$FUNC(..., shell=True, ...)
              metadata:
                category: security
            - id: tid-js-child-process-exec
              message: "Review dynamic shell execution in child_process."
              severity: WARNING
              languages: [javascript, typescript]
              patterns:
                - pattern-either:
                    - pattern: exec(...)
                    - pattern: execSync(...)
              metadata:
                category: security
          YAML

      - name: Run Semgrep
        if: ${{ inputs.enable_semgrep }}
        shell: bash
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.semgrep_app_token }}
        run: |
          set +e
          semgrep scan \
            --config auto \
            --config "${RUNNER_TEMP}/semgrep-ml.yml" \
            --sarif \
            --output "${RESULTS_DIR}/semgrep.sarif" \
            "${SCAN_DIR}"
          status=$?
          set -e

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "Semgrep reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Install Gitleaks
        if: ${{ inputs.enable_gitleaks }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o "${RUNNER_TEMP}/gitleaks.tar.gz"
          tar -xzf "${RUNNER_TEMP}/gitleaks.tar.gz" -C "${RUNNER_TEMP}"
          install "${RUNNER_TEMP}/gitleaks" "${RUNNER_TEMP}/bin/gitleaks"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run Gitleaks
        if: ${{ inputs.enable_gitleaks }}
        shell: bash
        run: |
          set +e
          gitleaks git \
            --source "${SCAN_DIR}" \
            --no-banner \
            --redact \
            --report-format sarif \
            --report-path "${RESULTS_DIR}/gitleaks.sarif"
          status=$?
          set -e

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "Gitleaks reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Upload Semgrep SARIF
        if: ${{ always() && inputs.enable_semgrep && hashFiles('results/semgrep.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/semgrep.sarif
          category: semgrep
          checkout_path: target

      - name: Upload Gitleaks SARIF
        if: ${{ always() && inputs.enable_gitleaks && hashFiles('results/gitleaks.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/gitleaks.sarif
          category: gitleaks
          checkout_path: target

      - name: Upload code scan artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-code-and-secrets
          if-no-files-found: ignore
          path: results/

  dependency-supply-chain:
    name: Dependency And Supply Chain
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Prepare results directory
        shell: bash
        run: mkdir -p "${RESULTS_DIR}"

      - name: Install OSV-Scanner
        if: ${{ inputs.enable_osv }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o "${RUNNER_TEMP}/osv-scanner"
          install "${RUNNER_TEMP}/osv-scanner" "${RUNNER_TEMP}/bin/osv-scanner"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run OSV-Scanner
        if: ${{ inputs.enable_osv }}
        shell: bash
        run: |
          set +e
          osv-scanner scan source \
            -r \
            --format sarif \
            --output "${RESULTS_DIR}/osv.sarif" \
            "${SCAN_DIR}"
          status=$?
          set -e

          if [ "${status}" -eq 128 ]; then
            echo "OSV-Scanner did not find lockfiles or manifests to analyze."
            exit 0
          fi

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "OSV-Scanner reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Upload OSV SARIF
        if: ${{ always() && inputs.enable_osv && hashFiles('results/osv.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/osv.sarif
          category: osv-scanner
          checkout_path: target

      - name: Upload dependency scan artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-dependency-scan
          if-no-files-found: ignore
          path: results/

  infrastructure-and-images:
    name: Infrastructure And Images
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Prepare results directory
        shell: bash
        run: mkdir -p "${RESULTS_DIR}"

      - name: Install Checkov
        if: ${{ inputs.enable_checkov }}
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install checkov

      - name: Install Trivy
        if: ${{ inputs.enable_trivy }}
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/bin"
          curl -fsSL \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o "${RUNNER_TEMP}/trivy.tar.gz"
          tar -xzf "${RUNNER_TEMP}/trivy.tar.gz" -C "${RUNNER_TEMP}/bin" trivy
          chmod +x "${RUNNER_TEMP}/bin/trivy"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Run Checkov
        if: ${{ inputs.enable_checkov }}
        shell: bash
        run: |
          set +e
          checkov \
            -d "${SCAN_DIR}" \
            --framework terraform,kubernetes,dockerfile,secrets,github_actions,helm,arm,bicep,cloudformation,sca_package \
            --download-external-modules true \
            -o sarif \
            --output-file-path "${RESULTS_DIR}/checkov.sarif"
          status=$?
          set -e

          if [ "${status}" -ne 0 ] && [ "${{ inputs.enforce }}" != "true" ]; then
            echo "Checkov reported findings; continuing because enforce=false."
            exit 0
          fi

          exit "${status}"

      - name: Run Trivy filesystem scan
        if: ${{ inputs.enable_trivy }}
        shell: bash
        run: |
          trivy fs \
            --scanners vuln,misconfig,secret,license \
            --severity "${{ inputs.fail_severity }}" \
            --ignore-unfixed \
            --format sarif \
            --output "${RESULTS_DIR}/trivy-fs.sarif" \
            --exit-code ${{ inputs.enforce && '1' || '0' }} \
            "${SCAN_DIR}"

      - name: Run Trivy image scan
        if: ${{ inputs.enable_trivy && inputs.image_ref != '' }}
        shell: bash
        run: |
          trivy image \
            --severity "${{ inputs.fail_severity }}" \
            --ignore-unfixed \
            --format sarif \
            --output "${RESULTS_DIR}/trivy-image.sarif" \
            --exit-code ${{ inputs.enforce && '1' || '0' }} \
            "${{ inputs.image_ref }}"

      - name: Upload Checkov SARIF
        if: ${{ always() && inputs.enable_checkov && hashFiles('results/checkov.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/checkov.sarif
          category: checkov
          checkout_path: target

      - name: Upload Trivy filesystem SARIF
        if: ${{ always() && inputs.enable_trivy && hashFiles('results/trivy-fs.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/trivy-fs.sarif
          category: trivy-fs
          checkout_path: target

      - name: Upload Trivy image SARIF
        if: ${{ always() && inputs.enable_trivy && hashFiles('results/trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results/trivy-image.sarif
          category: trivy-image
          checkout_path: target

      - name: Upload infrastructure scan artifacts
        if: ${{ always() && inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-infrastructure
          if-no-files-found: ignore
          path: results/

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: prepare
    if: ${{ inputs.enable_sbom }}
    permissions:
      contents: read
      actions: read
    steps:
      - name: Check out target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ needs.prepare.outputs.repository }}
          ref: ${{ needs.prepare.outputs.ref }}
          path: ${{ env.SCAN_DIR }}
          fetch-depth: 0
          token: ${{ secrets.checkout_token || github.token }}

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ env.SCAN_DIR }}
          format: spdx-json
          artifact-name: tid-secureci-sbom.spdx.json
          dependency-snapshot: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ${{ env.SCAN_DIR }}
          format: cyclonedx-json
          artifact-name: tid-secureci-sbom.cdx.json
          dependency-snapshot: false

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - prepare
      - code-and-secrets
      - dependency-supply-chain
      - infrastructure-and-images
      - sbom
    if: ${{ always() }}
    steps:
      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: tid-secureci-*
          merge-multiple: true

      - name: Build report assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p report

          count_sarif() {
            local file="$1"
            if [ -f "${file}" ] && jq empty "${file}" >/dev/null 2>&1; then
              jq '[.runs[]?.results[]?] | length' "${file}"
            else
              echo 0
            fi
          }

          semgrep_count=$(count_sarif artifacts/semgrep.sarif)
          gitleaks_count=$(count_sarif artifacts/gitleaks.sarif)
          osv_count=$(count_sarif artifacts/osv.sarif)
          checkov_count=$(count_sarif artifacts/checkov.sarif)
          trivy_fs_count=$(count_sarif artifacts/trivy-fs.sarif)
          trivy_image_count=$(count_sarif artifacts/trivy-image.sarif)
          total_count=$((semgrep_count + gitleaks_count + osv_count + checkov_count + trivy_fs_count + trivy_image_count))

          cat > report/report.md <<EOF
          # TID-SecureCI Report

          Repository: \`${{ needs.prepare.outputs.repository }}\`
          Ref: \`${{ needs.prepare.outputs.ref }}\`
          Enforce mode: \`${{ inputs.enforce }}\`
          Severity gate: \`${{ inputs.fail_severity }}\`

          ## Visual Flow

          \`\`\`mermaid
          flowchart LR
            A[Source Repo] --> B[Semgrep + Gitleaks]
            A --> C[OSV Dependency Scan]
            A --> D[Checkov + Trivy]
            A --> E[SBOM Generation]
            B --> F[GitHub Code Scanning]
            C --> F
            D --> F
            B --> G[Workflow Artifacts]
            C --> G
            D --> G
            E --> G
          \`\`\`

          ## Findings Snapshot

          | Scanner | Findings in artifact |
          | --- | ---: |
          | Semgrep | ${semgrep_count} |
          | Gitleaks | ${gitleaks_count} |
          | OSV-Scanner | ${osv_count} |
          | Checkov | ${checkov_count} |
          | Trivy FS | ${trivy_fs_count} |
          | Trivy Image | ${trivy_image_count} |
          | Total | ${total_count} |

          ## Job Status

          | Job | Result |
          | --- | --- |
          | Code And Secrets | \`${{ needs.code-and-secrets.result }}\` |
          | Dependency And Supply Chain | \`${{ needs.dependency-supply-chain.result }}\` |
          | Infrastructure And Images | \`${{ needs.infrastructure-and-images.result }}\` |
          | SBOM | \`${{ needs.sbom.result }}\` |

          ## Where To Look

          1. Open **Security -> Code scanning alerts** for line-level findings.
          2. Open **Actions -> this run -> Artifacts** for raw SARIF and SBOM downloads.
          3. Use the SBOM artifacts for inventory, license, and supply-chain review.

          ## Reading The Results

          - Semgrep surfaces code patterns that may lead to security issues or insecure DOM handling.
          - Gitleaks checks for exposed credentials or tokens in git history.
          - OSV maps lockfiles and manifests to published dependency vulnerabilities.
          - Checkov and Trivy cover infrastructure, misconfigurations, secrets, and package risk.
          - SBOM artifacts show what is in the build even when no alert is raised.
          EOF

          cat > report/report.html <<EOF
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>TID-SecureCI Report</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f4f7f2;
                --panel: #ffffff;
                --ink: #102418;
                --muted: #486153;
                --line: #d6e3d7;
                --accent: #14532d;
                --warn: #92400e;
              }
              body {
                margin: 0;
                font-family: ui-sans-serif, system-ui, sans-serif;
                background: linear-gradient(180deg, #eef6ed 0%, var(--bg) 100%);
                color: var(--ink);
              }
              .wrap {
                max-width: 980px;
                margin: 0 auto;
                padding: 32px 20px 48px;
              }
              .hero, .panel {
                background: var(--panel);
                border: 1px solid var(--line);
                border-radius: 18px;
                box-shadow: 0 12px 30px rgba(16, 36, 24, 0.06);
                padding: 24px;
                margin-bottom: 18px;
              }
              h1, h2 {
                margin: 0 0 12px;
              }
              .sub {
                color: var(--muted);
                margin-bottom: 8px;
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 12px;
                margin-top: 18px;
              }
              .card {
                border: 1px solid var(--line);
                border-radius: 14px;
                padding: 14px;
                background: #fbfdf9;
              }
              .label {
                font-size: 12px;
                text-transform: uppercase;
                color: var(--muted);
                letter-spacing: 0.08em;
              }
              .value {
                font-size: 28px;
                font-weight: 700;
                margin-top: 8px;
              }
              ol, ul {
                margin: 10px 0 0 20px;
                padding: 0;
              }
              code {
                background: #eef6ed;
                padding: 2px 6px;
                border-radius: 6px;
              }
            </style>
          </head>
          <body>
            <div class="wrap">
              <section class="hero">
                <h1>TID-SecureCI Report</h1>
                <div class="sub">Repository: ${{ needs.prepare.outputs.repository }}</div>
                <div class="sub">Ref: ${{ needs.prepare.outputs.ref }}</div>
                <div class="sub">Enforce mode: ${{ inputs.enforce }} | Severity gate: ${{ inputs.fail_severity }}</div>
                <div class="grid">
                  <div class="card"><div class="label">Semgrep</div><div class="value">${semgrep_count}</div></div>
                  <div class="card"><div class="label">Gitleaks</div><div class="value">${gitleaks_count}</div></div>
                  <div class="card"><div class="label">OSV</div><div class="value">${osv_count}</div></div>
                  <div class="card"><div class="label">Checkov</div><div class="value">${checkov_count}</div></div>
                  <div class="card"><div class="label">Trivy FS</div><div class="value">${trivy_fs_count}</div></div>
                  <div class="card"><div class="label">Total</div><div class="value">${total_count}</div></div>
                </div>
              </section>
              <section class="panel">
                <h2>How To Read This Run</h2>
                <ol>
                  <li>Open <code>Security -&gt; Code scanning alerts</code> for line-level issues.</li>
                  <li>Open <code>Actions -&gt; this run -&gt; Artifacts</code> for SARIF and SBOM files.</li>
                  <li>Use SPDX and CycloneDX SBOM files for dependency inventory and supply-chain review.</li>
                </ol>
              </section>
              <section class="panel">
                <h2>Scanner Coverage</h2>
                <ul>
                  <li>Semgrep checks application code and custom AI/ML guardrails.</li>
                  <li>Gitleaks checks git history for secrets.</li>
                  <li>OSV checks manifests and lockfiles against vulnerability advisories.</li>
                  <li>Checkov and Trivy check infrastructure, misconfigurations, and package risk.</li>
                </ul>
              </section>
            </div>
          </body>
          </html>
          EOF

      - name: Upload summary report artifact
        uses: actions/upload-artifact@v4
        with:
          name: tid-secureci-report
          path: report/

      - name: Publish summary
        shell: bash
        run: |
          {
            echo "## TID-SecureCI"
            echo
            echo "- Repository: \`${{ needs.prepare.outputs.repository }}\`"
            echo "- Ref: \`${{ needs.prepare.outputs.ref }}\`"
            echo "- Enforce mode: \`${{ inputs.enforce }}\`"
            echo "- Severity gate: \`${{ inputs.fail_severity }}\`"
            echo
            echo "### Scan Map"
            echo
            echo '```mermaid'
            echo 'flowchart LR'
            echo '  A[Source Repo] --> B[Semgrep and Gitleaks]'
            echo '  A --> C[OSV Dependency Scan]'
            echo '  A --> D[Checkov and Trivy]'
            echo '  A --> E[SBOM Generation]'
            echo '  B --> F[GitHub Code Scanning]'
            echo '  C --> F'
            echo '  D --> F'
            echo '  B --> G[Workflow Artifacts]'
            echo '  C --> G'
            echo '  D --> G'
            echo '  E --> G'
            echo '```'
            echo
            echo "### What To Review"
            echo
            echo "1. Open **Security -> Code scanning alerts** for issue-by-issue findings."
            echo "2. Open **Actions -> this run -> Artifacts** for raw SARIF, SBOMs, and the downloadable HTML/Markdown report."
            echo "3. Use the SBOM files to review the software inventory even when alerts are quiet."
            echo
            echo "### Job Results"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
