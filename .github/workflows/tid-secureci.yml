                  <tr><th>Last pushed</th><td>${repo_updated}</td></tr>
                  <tr><th>Trigger</th><td>${trigger}</td></tr>
                  <tr><th>Enforce mode</th><td>${{ inputs.enforce }}</td></tr>
                  <tr><th>Severity gate</th><td>${{ inputs.fail_severity }}</td></tr>
                </table>
                <p class="sub" style="margin-top:14px;">
                  <strong>Quick links:</strong>
                  <a href="${repo_url}">Code</a> &middot;
                  <a href="${repo_url}/issues">Issues</a> &middot;
                  <a href="${repo_url}/pulls">Pull requests</a> &middot;
                  <a href="${repo_url}/commits">Commits</a> &middot;
                  <a href="${repo_url}/security">Security</a> &middot;
                  <a href="${repo_url}/network/dependencies">Dependency graph</a>
                </p>
              </section>

              <section class="panel">
                <h2>2. Findings Snapshot</h2>
                <div class="grid">
                  <div class="card"><div class="label">Semgrep</div><div class="value">${semgrep_count}</div></div>
                  <div class="card"><div class="label">Gitleaks</div><div class="value">${gitleaks_count}</div></div>
