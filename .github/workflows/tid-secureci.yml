                several independent scanners into a single record for the repository
                and revision shown on the cover. This scan was triggered by a
                <code>${trigger}</code> event. Findings here are a point-in-time
                snapshot; authoritative, line-level results live in the GitHub
                Security tab and in the raw SARIF artifacts attached to this report.</p>
                <p><strong>Contents:</strong></p>
                <ol>
                  <li>Scan Overview</li>
