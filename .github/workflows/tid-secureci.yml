              table.findings th:nth-child(1), table.findings td:nth-child(1) { width: 9%; }
              table.findings th:nth-child(2), table.findings td:nth-child(2) { width: 9%; }
              table.findings th:nth-child(3), table.findings td:nth-child(3) { width: 22%; }
              table.findings th:nth-child(4), table.findings td:nth-child(4) { width: 16%; }
              table.findings th:nth-child(5), table.findings td:nth-child(5) { width: 35%; color: var(--muted); }
              table.findings th:nth-child(6), table.findings td:nth-child(6) { width: 9%; }
              .sev {
