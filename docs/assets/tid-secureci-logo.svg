<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="TID-SecureCI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a2e1a"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="check" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- shield with check -->
  <g transform="translate(140,96)">
    <path d="M116 0 L232 44 V128 C232 206 178 254 116 274 C54 254 0 206 0 128 V44 Z"
          fill="#0b3d22" stroke="#bbf7d0" stroke-width="9"/>
    <path d="M66 138 l36 36 l68 -84" fill="none" stroke="url(#check)"
          stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="256" y="430" text-anchor="middle"
        font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="58" font-weight="800" fill="#f3fbf4" letter-spacing="-1">TID-SecureCI</text>
</svg>
